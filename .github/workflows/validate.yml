name: Validate Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-structure:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "Checking required plugin files..."

          # Check main skill file
          if [ ! -f "SKILL.md" ]; then
            echo "❌ ERROR: SKILL.md not found"
            exit 1
          fi
          echo "✅ SKILL.md found"

          # Check README
          if [ ! -f "README.md" ]; then
            echo "❌ ERROR: README.md not found"
            exit 1
          fi
          echo "✅ README.md found"

          # Check LICENSE
          if [ ! -f "LICENSE" ]; then
            echo "❌ ERROR: LICENSE not found"
            exit 1
          fi
          echo "✅ LICENSE found"

          # Check skills directory
          if [ ! -d "skills" ]; then
            echo "❌ ERROR: skills directory not found"
            exit 1
          fi
          echo "✅ skills directory found"

      - name: Validate skill files
        run: |
          echo "Validating individual skill files..."

          skill_count=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="${skill_dir}SKILL.md"

            if [ ! -f "$skill_file" ]; then
              echo "❌ ERROR: $skill_file not found"
              exit 1
            fi

            # Check if file has content
            if [ ! -s "$skill_file" ]; then
              echo "❌ ERROR: $skill_file is empty"
              exit 1
            fi

            # Check for basic markdown headers
            if ! grep -q "^#" "$skill_file"; then
              echo "⚠️  WARNING: $skill_file might not have proper headers"
            fi

            echo "✅ $skill_name skill validated"
            skill_count=$((skill_count + 1))
          done

          echo "✅ Total skills validated: $skill_count"

          if [ $skill_count -lt 1 ]; then
            echo "❌ ERROR: No skills found"
            exit 1
          fi

      - name: Validate markdown syntax
        run: |
          echo "Checking markdown files for basic syntax..."

          # Check all .md files
          find . -name "*.md" -type f | while read file; do
            # Check file is not empty
            if [ ! -s "$file" ]; then
              echo "⚠️  WARNING: $file is empty"
              continue
            fi

            # Check for basic markdown structure
            if grep -q "^#" "$file"; then
              echo "✅ $file has headers"
            else
              echo "⚠️  WARNING: $file might be missing headers"
            fi
          done

      - name: Check for common issues
        run: |
          echo "Checking for common issues..."

          # Check for TODO or FIXME
          if grep -r "TODO\|FIXME" --include="*.md" .; then
            echo "⚠️  WARNING: Found TODO or FIXME comments"
          fi

          # Check for broken internal links (basic check)
          echo "Checking for potential broken links..."
          if grep -r "\[.*\](.*\.md)" --include="*.md" . | grep -v "http"; then
            echo "ℹ️  Found internal markdown links - manual verification recommended"
          fi

          echo "✅ Common issues check complete"

  test-installation:
    name: Test Installation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulate installation
        run: |
          echo "Simulating Claude Code plugin installation..."

          # Create a temporary directory to simulate ~/.claude/skills/
          TEST_DIR="/tmp/claude-test/skills/resume-hack"
          mkdir -p "$TEST_DIR"

          # Copy plugin files
          cp -r . "$TEST_DIR/"

          echo "✅ Files copied to test directory"

          # Verify structure
          cd "$TEST_DIR"

          if [ ! -f "SKILL.md" ]; then
            echo "❌ ERROR: Installation failed - SKILL.md not found"
            exit 1
          fi

          if [ ! -d "skills" ]; then
            echo "❌ ERROR: Installation failed - skills directory not found"
            exit 1
          fi

          echo "✅ Plugin structure validated in test installation"

          # Count skills
          skill_count=$(find skills -name "SKILL.md" | wc -l)
          echo "✅ Found $skill_count skill modules"

      - name: Validate plugin metadata
        run: |
          echo "Validating plugin metadata..."

          # Extract plugin name from README
          if grep -q "resume-hack" README.md; then
            echo "✅ Plugin name found in README"
          else
            echo "⚠️  WARNING: Plugin name might be missing from README"
          fi

          # Check for installation instructions
          if grep -q "Installation" README.md; then
            echo "✅ Installation instructions found"
          else
            echo "⚠️  WARNING: Installation instructions might be missing"
          fi

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Create markdownlint config
        run: |
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD034": false,
            "MD036": false
          }
          EOF

      - name: Lint markdown files
        continue-on-error: true
        run: |
          echo "Linting markdown files..."
          markdownlint '**/*.md' --ignore node_modules || true
          echo "✅ Markdown linting complete (warnings are non-blocking)"

  check-size:
    name: Check Plugin Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate plugin size
        run: |
          echo "Calculating plugin size..."

          # Total size
          total_size=$(du -sh . | cut -f1)
          echo "Total plugin size: $total_size"

          # Size breakdown
          echo "Size breakdown:"
          du -sh skills/ templates/ guidelines/ 2>/dev/null || true

          # File count
          file_count=$(find . -type f -name "*.md" | wc -l)
          echo "Total markdown files: $file_count"

          # Line count
          line_count=$(find . -name "*.md" -type f -exec wc -l {} + | tail -1 | awk '{print $1}')
          echo "Total lines of documentation: $line_count"

  validate-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow files
        run: |
          echo "Validating GitHub Actions workflow files..."

          for workflow in .github/workflows/*.yml; do
            echo "Checking $workflow..."
            # Basic YAML syntax check using Python
            python3 -c "import yaml; yaml.safe_load(open('$workflow'))"
            echo "✅ $workflow is valid YAML"
          done

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-structure, test-installation, lint-markdown, check-size, validate-yaml]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate-structure.result }}" == "success" ]; then
            echo "✅ Plugin structure validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Plugin structure validation failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-installation.result }}" == "success" ]; then
            echo "✅ Installation test passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Installation test failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.lint-markdown.result }}" == "success" ]; then
            echo "✅ Markdown linting passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Markdown linting completed with warnings" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.check-size.result }}" == "success" ]; then
            echo "✅ Size check passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Size check failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.validate-yaml.result }}" == "success" ]; then
            echo "✅ YAML validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ YAML validation failed" >> $GITHUB_STEP_SUMMARY
          fi
